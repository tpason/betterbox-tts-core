services:
  postgres:
    image: postgres:16-alpine
    container_name: betterbox-story-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: betterbox_story
      POSTGRES_USER: betterbox
      POSTGRES_PASSWORD: betterbox
    ports:
      - "54329:5432"
    volumes:
      - betterbox_story_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterbox -d betterbox_story"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  betterbox_story_pgdata:
