name: betterbox-tts

x-pipeline-env: &pipeline-env
  STORY_DATABASE_URL: ${STORY_DATABASE_URL:-postgresql://betterbox:betterbox@host.docker.internal:54329/betterbox_story}
  PYTHONUNBUFFERED: "1"
  READER_REALTIME_URL: ${READER_REALTIME_URL:-http://story-reader:3000}
  READER_REALTIME_DEV_URL: ${READER_REALTIME_DEV_URL:-}
  READER_REALTIME_TOKEN: ${READER_REALTIME_TOKEN:-}
  # Writable dirs when host story_data/ is 775 non-root (Docker runs as root).
  DISCOVERY_OUTPUT_DIR: ${DISCOVERY_OUTPUT_DIR:-/tmp/betterbox-discovery}
  DISCOVERY_URL_SKIP_STATE: ${DISCOVERY_URL_SKIP_STATE:-/tmp/betterbox-discovery/url_skip_state.json}

x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

# Healthcheck dùng chung: ping DB để xác nhận worker còn kết nối được.
x-db-healthcheck: &db-healthcheck
  test: ["CMD", "python", "-c",
    "import os, psycopg; conn = psycopg.connect(os.environ['STORY_DATABASE_URL']); conn.execute('SELECT 1'); conn.close()"]
  interval: 60s
  timeout: 10s
  retries: 3
  start_period: 30s

# Logging rotation cho tất cả service (tránh disk full sau thời gian dài chạy).
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  story-db-migrate:
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: "no"
    environment:
      <<: *pipeline-env
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    command: ["sh", "docker/scripts/run-db-migrations.sh"]

  story-reader:
    build:
      context: story_reader
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_READER_WS_URL: ${NEXT_PUBLIC_READER_WS_URL:-}
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      STORY_DATABASE_URL: ${STORY_DATABASE_URL:-postgresql://betterbox:betterbox@host.docker.internal:54329/betterbox_story}
      PORT: ${STORY_READER_PORT:-3000}
      READER_BIND_HOST: 0.0.0.0
      NODE_ENV: production
      READER_REALTIME_TOKEN: ${READER_REALTIME_TOKEN:-}
      NEXT_PUBLIC_READER_WS_URL: ${NEXT_PUBLIC_READER_WS_URL:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PUSH_SEND_SECRET: ${PUSH_SEND_SECRET:-}
      READER_SIGNUP_DISABLED: ${READER_SIGNUP_DISABLED:-}
      AUDIO_API_BLOCKING_JOB_TYPES: ${AUDIO_API_BLOCKING_JOB_TYPES:-audio_chapter_segments,audio_chapter,polish_chapter}
      AUDIO_API_MAX_RUNNING_JOBS: ${AUDIO_API_MAX_RUNNING_JOBS:-1}
      AUDIO_API_MAX_QUEUED_JOBS: ${AUDIO_API_MAX_QUEUED_JOBS:-1}
      AUDIO_API_MIN_FREE_RAM_GB: ${AUDIO_API_MIN_FREE_RAM_GB:-1.5}
      AUDIO_API_MAX_LOAD_PER_CPU: ${AUDIO_API_MAX_LOAD_PER_CPU:-0.9}
      AUDIO_API_MIN_FREE_VRAM_GB: ${AUDIO_API_MIN_FREE_VRAM_GB:-0}
      AUDIO_SEGMENT_VIENEU_MIN_FREE_VRAM_GB: ${AUDIO_SEGMENT_VIENEU_MIN_FREE_VRAM_GB:-0}
    extra_hosts: *host-gateway
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:' + (process.env.PORT || '3000') + '/api/health').then(r => r.json()).then(j => process.exit(j.ok && j.websocket ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${STORY_READER_PORT:-3000}:${STORY_READER_PORT:-3000}"

  # Hot-reload UI dev — no image rebuild. Use instead of story-reader while editing frontend.
  #   docker compose stop story-reader
  #   docker compose --profile dev up -d story-reader-dev
  #   open http://127.0.0.1:3003
  story-reader-dev:
    profiles: ["dev"]
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    volumes:
      - ./story_reader:/app
      - story_reader_dev_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules/next ]; then npm ci; fi && npm run dev:ws"
    environment:
      STORY_DATABASE_URL: ${STORY_DATABASE_URL:-postgresql://betterbox:betterbox@host.docker.internal:54329/betterbox_story}
      PORT: ${STORY_READER_DEV_PORT:-3003}
      READER_BIND_HOST: 0.0.0.0
      NODE_ENV: development
      READER_REALTIME_TOKEN: ${READER_REALTIME_TOKEN:-}
      NEXT_PUBLIC_READER_WS_URL: ${NEXT_PUBLIC_READER_WS_URL:-}
      NEXT_PUBLIC_ENABLE_PWA: ${NEXT_PUBLIC_ENABLE_PWA:-1}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PUSH_SEND_SECRET: ${PUSH_SEND_SECRET:-}
      READER_SIGNUP_DISABLED: ${READER_SIGNUP_DISABLED:-}
    extra_hosts: *host-gateway
    logging: *default-logging
    ports:
      - "${STORY_READER_DEV_PORT:-3003}:${STORY_READER_DEV_PORT:-3003}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:' + (process.env.PORT || '3003') + '/api/health').then(r => r.json()).then(j => process.exit(j.ok && j.websocket ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  story-admin:
    build:
      context: story_admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STORY_READER_URL: ${NEXT_PUBLIC_STORY_READER_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      STORY_DATABASE_URL: ${STORY_DATABASE_URL:-postgresql://betterbox:betterbox@host.docker.internal:54329/betterbox_story}
      PORT: ${STORY_ADMIN_PORT:-3001}
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      NEXT_PUBLIC_STORY_READER_URL: ${NEXT_PUBLIC_STORY_READER_URL:-http://localhost:3000}
      STORY_ADMIN_PUBLIC_URL: ${STORY_ADMIN_PUBLIC_URL:-http://localhost:3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      STORY_PIPELINE_ROOT: ${STORY_PIPELINE_ROOT:-/repo}
      STORY_PIPELINE_PYTHON: ${STORY_PIPELINE_PYTHON:-}
      STORY_PIPELINE_DOCKER: ${STORY_PIPELINE_DOCKER:-1}
      # QA: admin xem DB + user-triggered scan; không spawn từ container (GPU). CLI trên host.
      STORY_PIPELINE_DISABLE_QA_SPAWN: ${STORY_PIPELINE_DISABLE_QA_SPAWN:-1}
      STORY_PIPELINE_DOCKER_SERVICE: ${STORY_PIPELINE_DOCKER_SERVICE:-story-pipeline-cli}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
    volumes:
      - .:/repo:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts: *host-gateway
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + (process.env.PORT || '3001') + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${STORY_ADMIN_PORT:-3001}:${STORY_ADMIN_PORT:-3001}"

  # One-shot pipeline CLI for story-admin (profile tools). Example:
  #   docker compose --profile tools run --rm story-pipeline-cli repolish --story-id ... --chapter-numbers 1
  story-pipeline-cli:
    profiles: [tools]
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    environment:
      <<: *pipeline-env
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["python", "scripts/story_pipeline/admin_pipeline_cli.py"]

  story-discovery-scheduler:
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      DISCOVERY_INTERVAL_SECONDS: ${DISCOVERY_INTERVAL_SECONDS:-86400}
      DISCOVERY_SOURCES: ${DISCOVERY_SOURCES:-royalroad skydemonorder truyenfull_today}
      DISCOVERY_PAGES: ${DISCOVERY_PAGES:-2}
      DISCOVERY_MIN_CHAPTERS: ${DISCOVERY_MIN_CHAPTERS:-30}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-story-discovery.sh"]

  # Each replica independently claims stories from DB and crawls in parallel.
  # The DB claim mechanism prevents double-crawling between replicas.
  # Scale up: CRAWLER_REPLICAS=3 in .env, then docker compose up -d
  story-crawler-scheduler:
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      CRAWLER_INTERVAL_SECONDS: ${CRAWLER_INTERVAL_SECONDS:-300}
      CRAWLER_SOURCES: ${CRAWLER_SOURCES:-truyenfull_today truyenyy docln sttruyen truyenchuhay truyenhoangdung wattpad_vn royalroad skydemonorder wetriedtls lightnovelpub novelbin freewebnovel novelhub fanmtl}
      # Max threads per container; check_resources.py scales this down when system is busy.
      CRAWLER_WORKERS: ${CRAWLER_WORKERS:-4}
      CRAWLER_MIN_FREE_RAM_GB: ${CRAWLER_MIN_FREE_RAM_GB:-1.0}
      CRAWLER_MAX_CPU_PERCENT: ${CRAWLER_MAX_CPU_PERCENT:-85}
      CRAWLER_ONLY_INCOMPLETE: ${CRAWLER_ONLY_INCOMPLETE:-1}
      CRAWLER_MIN_CATALOG_CHECK_HOURS: ${CRAWLER_MIN_CATALOG_CHECK_HOURS:-1}
      CRAWLER_CLAIM_COOLDOWN_MINUTES: ${CRAWLER_CLAIM_COOLDOWN_MINUTES:-60}
      CRAWLER_LIMIT_STORIES: ${CRAWLER_LIMIT_STORIES:-0}
      CRAWLER_MAX_CHAPTERS: ${CRAWLER_MAX_CHAPTERS:-0}
      CRAWLER_TIMEOUT: ${CRAWLER_TIMEOUT:-30}
      CRAWLER_RETRIES: ${CRAWLER_RETRIES:-5}
      CRAWLER_RETRY_SLEEP: ${CRAWLER_RETRY_SLEEP:-2.0}
      CRAWLER_CHAPTER_DELAY: ${CRAWLER_CHAPTER_DELAY:-1.5}
      CRAWLER_CHAPTER_WORKERS: ${CRAWLER_CHAPTER_WORKERS:-2}
      CRAWLER_MAX_CONSECUTIVE_CONTENT_MISSES: ${CRAWLER_MAX_CONSECUTIVE_CONTENT_MISSES:-1}
      CRAWLER_POST_TRANSLATE: ${CRAWLER_POST_TRANSLATE:-polish}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-crawler-scheduler.sh"]
    deploy:
      replicas: ${CRAWLER_REPLICAS:-1}

  # Finds a source B for incomplete source-A stories, then merges new chapters
  # into the same story_id. Defaults to dry-run; set ALTERNATE_APPLY=1 to import.
  story-alternate-scheduler:
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      ALTERNATE_INTERVAL_SECONDS: ${ALTERNATE_INTERVAL_SECONDS:-21600}
      ALTERNATE_TARGET_SOURCES: ${ALTERNATE_TARGET_SOURCES:-truyenfull_today truyenyy docln sttruyen truyenchuhay truyenhoangdung wattpad_vn}
      ALTERNATE_PROVIDERS: ${ALTERNATE_PROVIDERS:-lightnovelpub royalroad}
      ALTERNATE_ALIAS_JSON: ${ALTERNATE_ALIAS_JSON:-}
      ALTERNATE_LIMIT_STORIES: ${ALTERNATE_LIMIT_STORIES:-20}
      ALTERNATE_MIN_SCORE: ${ALTERNATE_MIN_SCORE:-0.72}
      ALTERNATE_MAX_CANDIDATES: ${ALTERNATE_MAX_CANDIDATES:-5}
      ALTERNATE_RESUME_FROM: ${ALTERNATE_RESUME_FROM:-polished}
      ALTERNATE_APPLY: ${ALTERNATE_APPLY:-0}
      ALTERNATE_POLISH_INLINE: ${ALTERNATE_POLISH_INLINE:-0}
      ALTERNATE_POST_TRANSLATE: ${ALTERNATE_POST_TRANSLATE:-copy}
      ALTERNATE_ALIAS_INFERENCE: ${ALTERNATE_ALIAS_INFERENCE:-heuristic}
      ALTERNATE_ALIAS_MODEL: ${ALTERNATE_ALIAS_MODEL:-qwen3:14b}
      ALTERNATE_ALIAS_TIMEOUT: ${ALTERNATE_ALIAS_TIMEOUT:-120}
      ALTERNATE_CHAR_MAP_TEXT_SOURCE: ${ALTERNATE_CHAR_MAP_TEXT_SOURCE:-auto}
      ALTERNATE_CHAR_MAP_MIN_FREQUENCY: ${ALTERNATE_CHAR_MAP_MIN_FREQUENCY:-1}
      ALTERNATE_LOG_SKIPPED_QUERIES: ${ALTERNATE_LOG_SKIPPED_QUERIES:-0}
      ALTERNATE_INCLUDE_COMPLETED: ${ALTERNATE_INCLUDE_COMPLETED:-0}
      ALTERNATE_MAX_CHAPTERS: ${ALTERNATE_MAX_CHAPTERS:-0}
      ALTERNATE_TIMEOUT: ${ALTERNATE_TIMEOUT:-30}
      ALTERNATE_RETRIES: ${ALTERNATE_RETRIES:-3}
      ALTERNATE_RETRY_SLEEP: ${ALTERNATE_RETRY_SLEEP:-2.0}
      ALTERNATE_SEARCH_DELAY: ${ALTERNATE_SEARCH_DELAY:-0.5}
      ALTERNATE_PROVIDER_FAILURE_LIMIT: ${ALTERNATE_PROVIDER_FAILURE_LIMIT:-1}
      ALTERNATE_DIRECT_SLUG_CANDIDATES: ${ALTERNATE_DIRECT_SLUG_CANDIDATES:-0}
      ALTERNATE_CHAPTER_DELAY: ${ALTERNATE_CHAPTER_DELAY:-1.5}
      ALTERNATE_REQUEUE_DONE: ${ALTERNATE_REQUEUE_DONE:-0}
      ALTERNATE_STORY_MEMORY_DIR: ${ALTERNATE_STORY_MEMORY_DIR:-}
      ALTERNATE_FAIL_ON_STORY_MEMORY_ISSUES: ${ALTERNATE_FAIL_ON_STORY_MEMORY_ISSUES:-0}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-alternate-scheduler.sh"]

  # LLM-heavy (gọi ollama). KHÔNG auto-start; chạy thủ công: docker compose --profile ai up -d
  char-map-updater:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      CHAR_MAP_INTERVAL_SECONDS: ${CHAR_MAP_INTERVAL_SECONDS:-43200}
      CHAR_MAP_MODEL: ${CHAR_MAP_MODEL:-qwen3:14b}
      CHAR_MAP_LIMIT: ${CHAR_MAP_LIMIT:-10}
      CHAR_MAP_MIN_POLISHED: ${CHAR_MAP_MIN_POLISHED:-10}
      CHAR_MAP_NEW_CHAPTER_THRESHOLD: ${CHAR_MAP_NEW_CHAPTER_THRESHOLD:-50}
      CHAR_MAP_SAMPLE_CHAPTERS: ${CHAR_MAP_SAMPLE_CHAPTERS:-30}
      CHAR_MAP_TIMEOUT: ${CHAR_MAP_TIMEOUT:-600}
      CHAR_MAP_DELAY: ${CHAR_MAP_DELAY:-3}
      CHAR_MAP_APPEND_ONLY: ${CHAR_MAP_APPEND_ONLY:-}
      CHAR_MAP_MIN_FREE_VRAM_GB: ${CHAR_MAP_MIN_FREE_VRAM_GB:-0}
      CHAR_MAP_MIN_FREE_RAM_GB: ${CHAR_MAP_MIN_FREE_RAM_GB:-1.5}
      CHAR_MAP_MAX_CPU_PCT: ${CHAR_MAP_MAX_CPU_PCT:-85}
      CHAR_MAP_RESOURCE_WAIT: ${CHAR_MAP_RESOURCE_WAIT:-1800}
      CHAR_MAP_RESOURCE_POLL: ${CHAR_MAP_RESOURCE_POLL:-30}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-char-map-updater.sh"]

  audio-enqueuer:
    profiles: ["audio"]
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      AUDIO_ENQUEUE_INTERVAL_SECONDS: ${AUDIO_ENQUEUE_INTERVAL_SECONDS:-1800}
      AUDIO_ENQUEUE_LIMIT: ${AUDIO_ENQUEUE_LIMIT:-200}
      AUDIO_OUTPUT_ROOT: ${AUDIO_OUTPUT_ROOT:-story_audio}
      AUDIO_ENQUEUE_SOURCES: ${AUDIO_ENQUEUE_SOURCES:-}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-audio-enqueuer.sh"]

  ollama:
    profiles: ["ai"]
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - betterbox_ollama_data:/root/.ollama
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # LLM-heavy (gọi ollama). KHÔNG auto-start; chạy thủ công: docker compose --profile ai up -d
  polish-worker:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: docker/story-pipeline.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      POLISH_WORKERS: ${POLISH_WORKERS:-1}
      POLISH_SOURCE_CODES: ${POLISH_SOURCE_CODES:-}
      POLISH_CLAIM_ORDER: ${POLISH_CLAIM_ORDER:-non-vi-rank-tier}
      POLISH_VI_MODEL: ${POLISH_VI_MODEL:-qwen3:14b}
      POLISH_TRANSLATE_MODEL: ${POLISH_TRANSLATE_MODEL:-qwen3:14b}
      POLISH_POST_TRANSLATE: ${POLISH_POST_TRANSLATE:-polish}
      POLISH_CHAR_MAP_TEXT_SOURCE: ${POLISH_CHAR_MAP_TEXT_SOURCE:-auto}
      POLISH_CHAR_MAP_MIN_FREQUENCY: ${POLISH_CHAR_MAP_MIN_FREQUENCY:-1}
      POLISH_STORY_MEMORY_DIR: ${POLISH_STORY_MEMORY_DIR:-}
      POLISH_FAIL_ON_STORY_MEMORY_ISSUES: ${POLISH_FAIL_ON_STORY_MEMORY_ISSUES:-0}
      POLISH_INTERVAL_SECONDS: ${POLISH_INTERVAL_SECONDS:-30}
      POLISH_MIN_FREE_RAM_GB: ${POLISH_MIN_FREE_RAM_GB:-2.0}
      POLISH_MAX_CPU_PERCENT: ${POLISH_MAX_CPU_PERCENT:-80}
      POLISH_NO_SAVE_FILES: ${POLISH_NO_SAVE_FILES:-1}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
    logging: *default-logging
    healthcheck:
      # Kiểm tra DB + Ollama đều reachable.
      test: ["CMD", "sh", "-c",
        "python -c \"import os,psycopg; psycopg.connect(os.environ['STORY_DATABASE_URL']).execute('SELECT 1')\" && \
         curl -sf ${OLLAMA_URL:-http://host.docker.internal:11434}/api/tags > /dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    command: ["sh", "docker/scripts/run-polish-worker.sh"]

  audio-worker:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: docker/story-tts-gpu.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      AUDIO_VIENEU_DEVICE: ${AUDIO_VIENEU_DEVICE:-auto}
      AUDIO_VIENEU_BACKEND: ${AUDIO_VIENEU_BACKEND:-auto}
      AUDIO_VIENEU_VOICE: ${AUDIO_VIENEU_VOICE:-Trọng Hữu}
      AUDIO_VIENEU_VOICE_PROFILE: ${AUDIO_VIENEU_VOICE_PROFILE:-preset_trong_huu}
      AUDIO_VIENEU_REFERENCE_AUDIO: ${AUDIO_VIENEU_REFERENCE_AUDIO:-}
      AUDIO_VIENEU_REFERENCE_TEXT: ${AUDIO_VIENEU_REFERENCE_TEXT:-}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
      - betterbox_torch_cache:/root/.cache/torch
      - betterbox_hf_cache:/root/.cache/huggingface
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-audio-worker.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  audio-segment-worker:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: docker/story-tts-gpu.Dockerfile
    restart: unless-stopped
    depends_on:
      story-db-migrate:
        condition: service_completed_successfully
    environment:
      <<: *pipeline-env
      AUDIO_SEGMENT_VIENEU_DEVICE: ${AUDIO_SEGMENT_VIENEU_DEVICE:-auto}
      AUDIO_SEGMENT_VIENEU_BACKEND: ${AUDIO_SEGMENT_VIENEU_BACKEND:-auto}
      AUDIO_SEGMENT_MIN_FREE_RAM_GB: ${AUDIO_SEGMENT_MIN_FREE_RAM_GB:-1.5}
      AUDIO_SEGMENT_MAX_CPU_PERCENT: ${AUDIO_SEGMENT_MAX_CPU_PERCENT:-90}
      AUDIO_SEGMENT_RESOURCE_WAIT_SECONDS: ${AUDIO_SEGMENT_RESOURCE_WAIT_SECONDS:-10}
      AUDIO_SEGMENT_OUTPUT_ROOT: ${AUDIO_SEGMENT_OUTPUT_ROOT:-story_audio_segments}
      AUDIO_SEGMENT_VIENEU_VOICE_KEY: ${AUDIO_SEGMENT_VIENEU_VOICE_KEY:-preset_trong_huu}
      AUDIO_SEGMENT_VIENEU_VOICE: ${AUDIO_SEGMENT_VIENEU_VOICE:-Trọng Hữu}
      AUDIO_SEGMENT_VIENEU_VOICE_PROFILE: ${AUDIO_SEGMENT_VIENEU_VOICE_PROFILE:-preset_trong_huu}
      AUDIO_SEGMENT_VIENEU_REFERENCE_AUDIO: ${AUDIO_SEGMENT_VIENEU_REFERENCE_AUDIO:-}
      AUDIO_SEGMENT_VIENEU_REFERENCE_TEXT: ${AUDIO_SEGMENT_VIENEU_REFERENCE_TEXT:-}
      AUDIO_SEGMENT_GPU_LOCK_PATH: ${AUDIO_SEGMENT_GPU_LOCK_PATH:-/tmp/betterbox_tts_gpu.lock}
    extra_hosts: *host-gateway
    volumes:
      - .:/app
      - betterbox_torch_cache:/root/.cache/torch
      - betterbox_hf_cache:/root/.cache/huggingface
    logging: *default-logging
    healthcheck: *db-healthcheck
    command: ["sh", "docker/scripts/run-audio-segment-worker.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

volumes:
